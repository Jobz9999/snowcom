databases:
  - name: snowcom-db
    databaseName: snowcom_production_tf84
    user: snowcom_user
    region: virginia

services:
  - type: web
    name: snowcom
    env: ruby
    region: virginia
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    preDeployCommand: ./bin/rails db:migrate
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snowcom-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
